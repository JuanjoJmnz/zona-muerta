<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo negro -->
  <rect width="32" height="32" fill="#0c0c0c"/>
  
  <!-- Círculo exterior -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c0392b" stroke-width="1.5"/>
  
  <!-- Cruz interior -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#c0392b" stroke-width="1.5"/>
  
  <!-- Punto central -->
  <circle cx="16" cy="16" r="2.5" fill="#c0392b"/>
  
  <!-- Muescas en los ejes (estilo de mira) -->
  <line x1="16" y1="5"  x2="16" y2="8"  stroke="#0c0c0c" stroke-width="2"/>
  <line x1="16" y1="24" x2="16" y2="27" stroke="#0c0c0c" stroke-width="2"/>
  <line x1="5"  y1="16" x2="8"  y2="16" stroke="#0c0c0c" stroke-width="2"/>
  <line x1="24" y1="16" x2="27" y2="16" stroke="#0c0c0c" stroke-width="2"/>
  
  <!-- Arcos en las esquinas (estilo técnico/militar) -->
  <path d="M 6 6 L 6 10 M 6 6 L 10 6" fill="none" stroke="#c0392b" stroke-width="1"/>
  <path d="M 26 6 L 26 10 M 26 6 L 22 6" fill="none" stroke="#c0392b" stroke-width="1"/>
  <path d="M 6 26 L 6 22 M 6 26 L 10 26" fill="none" stroke="#c0392b" stroke-width="1"/>
  <path d="M 26 26 L 26 22 M 26 26 L 22 26" fill="none" stroke="#c0392b" stroke-width="1"/>
</svg>
